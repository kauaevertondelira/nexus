<!DOCTYPE html>
<html lang="pt-PT" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Industrial - Acesso Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' }, brand: '#3b82f6' } } }
        }
    </script>
</head>

<body
    class="bg-slate-50 text-slate-800 dark:bg-[#0b1120] dark:text-slate-300 font-sans h-screen flex items-center justify-center relative overflow-hidden transition-colors duration-300">

    <a href="../../index.html"
        class="absolute top-6 left-6 h-10 w-10 bg-white dark:bg-dark-800 text-slate-500 dark:text-slate-400 rounded-full shadow-md flex items-center justify-center hover:text-brand transition-colors z-50 group"
        title="Voltar à Apresentação">
        <i class="fas fa-arrow-left transition-transform group-hover:-translate-x-1"></i>
    </a>

    <button id="theme-toggle"
        class="absolute top-6 right-6 h-10 w-10 bg-white dark:bg-dark-800 text-slate-500 dark:text-slate-400 rounded-full shadow-md flex items-center justify-center hover:text-brand transition-colors z-50">
        <i class="fas fa-sun hidden dark:block text-amber-500"></i>
        <i class="fas fa-moon block dark:hidden"></i>
    </button>

    <div
        class="relative z-10 w-full max-w-md p-8 bg-white/80 dark:bg-[#151c2c]/80 backdrop-blur-xl rounded-3xl shadow-xl border border-white/40 dark:border-white/5 transition-colors duration-300">

        <div class="text-center mb-8 relative z-10">
            <img id="logo-main" src="../../IMG/canvas-b.png" alt="Nexus Industrial Logo"
                class="h-16 w-auto transition-all duration-300 mx-auto mb-4 drop-shadow-lg invert dark:invert-0">
        </div <form id="login-form" class="space-y-5">

        <form id="login-form" class="space-y-5">
            <div>
                <label
                    class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-2">Credencial
                    de Operador</label>
                <div class="relative">
                    <i
                        class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 dark:text-slate-500"></i>
                    <input type="text" id="login-email" required
                        class="w-full bg-slate-100 dark:bg-dark-900/50 border border-slate-200 dark:border-dark-800/50 text-slate-800 dark:text-white rounded-xl pl-12 pr-4 py-3.5 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all placeholder-slate-400 dark:placeholder-slate-600"
                        placeholder="ID ou E-mail">
                </div>
            </div>

            <div>
                <label
                    class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-2">Código
                    de Acesso</label>
                <div class="relative">
                    <i
                        class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 dark:text-slate-500"></i>
                    <input type="password" id="login-password" required
                        class="w-full bg-slate-100 dark:bg-dark-900/50 border border-slate-200 dark:border-dark-800/50 text-slate-800 dark:text-white rounded-xl pl-12 pr-4 py-3.5 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all placeholder-slate-400 dark:placeholder-slate-600"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-brand hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand/30 transition-all transform hover:-translate-y-0.5 uppercase tracking-wide text-sm mt-2">
                Aceder ao Painel
            </button>

            <div class="mt-6 text-center" id="register-link-container">
                <p class="text-xs text-slate-500 dark:text-slate-500">Primeiro acesso? <a href="#" id="show-register"
                        class="text-brand font-bold hover:underline">Solicitar perfil</a></p>
            </div>
        </form>

        <form id="register-form" class="space-y-4 hidden">
            <div class="flex justify-center mb-4 relative group">
                <label for="reg-photo" class="cursor-pointer">
                    <div id="photo-preview"
                        class="w-20 h-20 rounded-full bg-slate-100 dark:bg-dark-800 border-2 border-dashed border-slate-300 dark:border-dark-700 flex items-center justify-center text-slate-400 dark:text-slate-500 overflow-hidden relative transition-colors">
                        <i class="fas fa-camera text-xl group-hover:scale-110 transition-transform"></i>
                    </div>
                </label>
                <input type="file" id="reg-photo" accept="image/*" class="hidden">
            </div>

            <div><input type="text" id="reg-name" required
                    class="w-full bg-slate-100 dark:bg-dark-900/50 border border-slate-200 dark:border-dark-800/50 text-slate-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-brand text-sm placeholder-slate-400 dark:placeholder-slate-600"
                    placeholder="Nome Completo"></div>
            <div>
                <select id="reg-role" required
                    class="w-full bg-slate-100 dark:bg-dark-900/50 border border-slate-200 dark:border-dark-800/50 text-slate-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-brand text-sm">
                    <option value="" disabled selected>Selecionar Cargo / Setor</option>
                    <option value="Operador (Chão de Fábrica)">Operador (Chão de Fábrica)</option>
                    <option value="Técnico de Manutenção">Técnico de Manutenção</option>
                    <option value="Gestor PCM">Gestor PCM / Engenharia</option>
                    <option value="Almoxarifado / Suprimentos">Almoxarifado / Suprimentos</option>
                </select>
            </div>
            <div><input type="email" id="reg-email" required
                    class="w-full bg-slate-100 dark:bg-dark-900/50 border border-slate-200 dark:border-dark-800/50 text-slate-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-brand text-sm placeholder-slate-400 dark:placeholder-slate-600"
                    placeholder="E-mail Corporativo"></div>
            <div><input type="password" id="reg-password" required
                    class="w-full bg-slate-100 dark:bg-dark-900/50 border border-slate-200 dark:border-dark-800/50 text-slate-800 dark:text-white rounded-xl px-4 py-3 focus:outline-none focus:border-brand text-sm placeholder-slate-400 dark:placeholder-slate-600"
                    placeholder="Palavra-passe Segura"></div>

            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-500/30 transition-all uppercase tracking-wide text-sm mt-2">
                Criar Perfil
            </button>
            <div class="mt-4 text-center">
                <p class="text-xs text-slate-500"><a href="#" id="show-login"
                        class="text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors">Voltar
                        ao Login</a></p>
            </div>
        </form>
    </div>

    <script type="module" src="../assets/js/login.js">
    </script>
</body>

</html>
